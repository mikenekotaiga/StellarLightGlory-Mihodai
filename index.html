<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stellar Light Glory</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- フライヤー -->
    <section class="card fade">

        <img src="images/flyer.jpg"
             class="flyer"
             alt="Flyer"
             onclick="openImage(this.src)">

    </section>


    <!-- 無料視聴音源 -->
    <section class="card fade">

        <h2>無料視聴音源</h2>

        <img src="images/jacket.jpg"
             class="jacket"
             alt="ジャケット">

        <div class="song-info">

            <h3 class="song-title">『愛の唄』</h3>

            <p class="artist-name">
                Stellar Light Glory
            </p>

        </div>

        <audio controls>

            <source src="audio/sample.mp3"
                    type="audio/mpeg">

        </audio>

        <a href="audio/sample.mp3"
           download
           class="download">

           ⬇ MP3をダウンロード

        </a>

    </section>


    <!-- 各種リンク -->

<section class="card fade">

    <h2>各種SNS・サブスク・ライブ情報などは</h2>

    <a href="https://lit.link/stellarlightglory"
       target="_blank"
       class="follow">

       ここをタップ

    </a>

</section>

</div>


<!-- フライヤー拡大 -->

<div id="viewer"
     onclick="closeImage()">

    <img id="viewerImage">

</div>


<script>

function openImage(src){

document.getElementById("viewer").style.display="flex";

document.getElementById("viewerImage").src=src;

}

function closeImage(){

document.getElementById("viewer").style.display="none";

}

</script>

</body>

</html>
