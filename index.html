<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stellar Light Glory</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<!-- フライヤー -->

<section class="card fade">

<img src="images/flyer.jpg"

class="flyer"

alt="Flyer"

onclick="openImage(this.src)">

</section>


<!-- NEW SONG -->

<section class="card fade">

<h2>NEW SONG</h2>

<img src="images/jacket.jpg"

class="jacket"

alt="Jacket">

<audio controls>

<source src="audio/sample.mp3"

type="audio/mpeg">

</audio>

<a href="audio/sample.mp3"

download

class="download">

⬇ MP3 DOWNLOAD

</a>

</section>


<!-- FOLLOW -->

<section class="card fade">

<h2>FOLLOW US</h2>

<a
href="https://lit.link/stellarlightglory"
target="_blank"
class="follow">

LitLink

</a>

</section>

</div>


<!-- 拡大表示 -->

<div id="viewer"

onclick="closeImage()">

<img id="viewerImage">

</div>


<script>

function openImage(src){

document.getElementById("viewer").style.display="flex";

document.getElementById("viewerImage").src=src;

}

function closeImage(){

document.getElementById("viewer").style.display="none";

}

</script>

</body>

</html>
